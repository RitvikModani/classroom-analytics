# Classroom Behavior Analytics — runtime config.
# Secrets (RTSP user:pass URLs) do NOT go here — put them in .env (RTSP_URL).

source: 0                 # 0 = default webcam; or a file path; RTSP via .env
device: auto              # auto | intel:gpu (OpenVINO on Arc) | cpu
model: yolov8n-pose.pt    # or an exported *_openvino_model/ folder
imgsz: 640
det_conf: 0.30            # detection confidence floor
frame_skip: 0             # >0 = process every (skip+1)-th frame (degraded mode)
queue_size: 4             # bounded capture queue (drop-oldest)
reconnect_delay: 2.0      # seconds between camera reconnect attempts
smoothing_window: 9       # frames of per-track majority vote

thresholds:               # geometric heuristics (fractions of shoulder width)
  kp_conf: 0.30
  hand_raise_ratio: 0.40
  head_down_ratio: 0.35
  head_up_ratio: 0.55
  standing_aspect: 2.2
  min_core_conf: 0.30

aggregate:
  timeline_maxlen: 600          # rolling attention-graph points (bounded)
  engagement_window: 60         # frames used for per-track engagement score
  off_task_frames: 20           # sustained head-down frames -> off-task bucket
  sleep_frames: 90              # sustained head-down -> "possibly asleep" flag
  heads_down_alert_pct: 30.0    # class-wide heads-down alert threshold
  low_attention_alert_pct: 50.0
  neighbor_dist_ratio: 1.8      # proximity for low-confidence interaction hint

server:
  host: 127.0.0.1
  port: 8000
  jpeg_quality: 70
  send_frames: true             # false = push overlays/stats only (low bandwidth)
